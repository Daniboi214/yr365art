            "10-4": { head: "The Boy King Revealed", body: "1922. In the Valley of the Kings, Howard Carter’s team discovered the first step leading to the tomb of Tutankhamun. It was the start of the greatest archaeological find in history, unlocking three millennia of silence." },
            "10-5": { head: "The Gunpowder Plot", body: "1605. Guy Fawkes was discovered in a cellar beneath the British Parliament with 36 barrels of gunpowder. The failed attempt to blow up the King became an eternal symbol of rebellion and state survival." },
            "10-6": { head: "Lincoln Wins the Presidency", body: "1860. Abraham Lincoln was elected as the 16th President of the United States. His victory acted as the immediate catalyst for the secession of Southern states and the start of the American Civil War." },
            "10-7": { head: "The October Revolution", body: "1917. Led by Vladimir Lenin, the Bolsheviks seized power in Petrograd. Despite the name (due to the old calendar), this event birthed the Soviet Union and set the stage for a century of global ideological conflict." },
            "10-8": { head: "The Beer Hall Putsch", body: "1923. Adolf Hitler launched a failed coup attempt in a Munich beer hall. Though he was imprisoned, the event gave the Nazi movement its first major national platform and its most powerful propaganda tool." },
            "10-9": { head: "The Fall of the Berlin Wall", body: "1989. After 28 years of dividing a city and a world, the Berlin Wall was opened. Thousands of East and West Berliners climbed the concrete barrier in a celebration that signaled the end of the Cold War." },
            "10-10": { head: "The Hope of the Seas", body: "1975. The SS Edmund Fitzgerald, a massive ore carrier, vanished in a storm on Lake Superior. The tragedy became a legendary piece of Great Lakes folklore, immortalized as a reminder of the raw power of nature." },
            "10-11": { head: "The Great Silence", body: "1918. At the 11th hour of the 11th day of the 11th month, the Armistice was signed, ending the fighting of World War I. A world exhausted by four years of unprecedented slaughter finally fell silent." },
            "10-12": { head: "The Proposal for the Web", body: "1990. Tim Berners-Lee published a formal proposal for a 'World Wide Web.' It was the precise moment the blueprint for our modern interconnected civilization was laid out for the first time." },
            "10-13": { head: "The Wall of Names", body: "1982. The Vietnam Veterans Memorial was dedicated in Washington, D.C. Its minimalist black granite design, inscribed with over 58,000 names, redefined how nations mourn their fallen soldiers." },
            "10-14": { head: "Around the World in 72 Days", body: "1889. Journalist Nellie Bly set out to beat Phileas Fogg’s fictional record. She completed her journey around the globe in just 72 days, proving that the world was shrinking thanks to modern steam and rail." },
            "10-15": { head: "The Scramble for Africa", body: "1884. The Berlin Conference opened, where European powers met to divide the African continent amongst themselves. The borders drawn this day, with no African input, would define the continent's struggles for over a century." },
            "10-16": { head: "The Foundation of UNESCO", body: "1945. In the wake of WWII, UNESCO was created to build peace through international cooperation in education, science, and culture, ensuring the world’s shared heritage would be protected." },
            "10-17": { head: "The Golden Age Begins", body: "1558. Upon the death of her sister Mary, Elizabeth I ascended the English throne. Her 44-year reign would oversee a flourishing of the arts and the rise of England as a global maritime power." },
            "10-18": { head: "The Tragedy of Jonestown", body: "1978. In a remote jungle clearing in Guyana, over 900 people died in a mass murder-suicide led by cult leader Jim Jones. It remains a haunting lesson in the dangers of total ideological devotion." },
            "10-19": { head: "The Gettysburg Address", body: "1863. Standing on a blood-stained battlefield, Abraham Lincoln delivered a two-minute speech that redefined the American purpose, dedicating the nation to a 'new birth of freedom.'" },
            "10-20": { head: "The Nuremberg Trials", body: "1945. The trials of 24 high-ranking Nazi officials began in Germany. It was the first time in history that leaders were held legally accountable for 'crimes against humanity' in an international court." },
            "10-21": { head: "The First Untethered Flight", body: "1783. In Paris, Jean-François Pilâtre de Rozier and the Marquis d'Arlandes made the first free flight in a hot air balloon, breaking humanity's ancient bond with the earth for 25 breathtaking minutes." },
            "10-22": { head: "The Assassination of JFK", body: "1963. President John F. Kennedy was shot while riding in a motorcade through Dallas. The event, captured on a graining home movie, shattered the innocence of a decade and remains a focal point of global mystery." },
            "10-23": { head: "The First Jukebox", body: "1889. The 'nickel-in-the-slot' phonograph was installed in a San Francisco saloon. It was the birth of the jukebox and the first time recorded music became a shared, public experience." },
            "10-24": { head: "The Origin of Species", body: "1859. Charles Darwin’s 'On the Origin of Species' was published. The book's explanation of natural selection fundamentally challenged the foundations of science and religion alike." },
            "10-25": { head: "The Equations of Gravity", body: "1915. Albert Einstein presented his final field equations for General Relativity to the Prussian Academy of Sciences, revealing that gravity is actually the curvature of space and time." },
            "10-26": { head: "Inside the Golden Chamber", body: "1922. Howard Carter made a small hole in the sealed door of Tutankhamun's tomb. When asked if he could see anything, he famously replied: 'Yes, wonderful things!'" },
            "10-27": { head: "The Preaching of the Crusade", body: "1095. At the Council of Clermont, Pope Urban II called for a holy war to reclaim Jerusalem. His speech triggered the First Crusade, setting off centuries of religious conflict between East and West." },
            "10-28": { head: "The Pacific is Named", body: "1520. Ferdinand Magellan’s fleet emerged from the treacherous straits at the tip of South America into a vast, calm ocean. He named it 'Mar Pacífico'—the Peaceful Sea." },
            "10-29": { head: "The First Internet Message", body: "1969. The first message was sent over ARPANET between UCLA and SRI. The system crashed after the first two letters—'LO'—but the spark of the global internet had been struck." },
            "10-30": { head: "The Winter War", body: "1939. The Soviet Union launched a massive invasion of Finland. Despite being vastly outnumbered, the Finnish resistance became a legendary symbol of courage and tactical brilliance in the snow." },

           "10-30": { head: "The Winter War", body: "1939. The Soviet Union launched a massive invasion of Finland. Despite being vastly outnumbered, the Finnish resistance became a legendary symbol of courage and tactical brilliance in the snow." }, // <--- MAKE SURE THIS COMMA IS HERE!

            // DECEMBER (Month 11)
            "11-1": { head: "The Defiance of Rosa Parks", body: "1955. In Montgomery, Alabama, Rosa Parks refused to give up her bus seat to a white passenger. Her quiet act of rebellion launched the Montgomery Bus Boycott and became the spark that ignited the modern Civil Rights Movement." },
            "11-2": { head: "The Monroe Doctrine", body: "1823. President James Monroe delivered a message to Congress forbidding European powers from further colonizing the Americas. It was a bold declaration of sovereignty that defined Western Hemisphere diplomacy for centuries." },
            "11-3": { head: "The First Heart Transplant", body: "1967. In a hospital in Cape Town, surgeon Christiaan Barnard performed the first human-to-human heart transplant. It was a staggering triumph of medical science that pushed the boundaries of what was possible for the human body." },
            "11-4": { head: "The Birth of the Digital Image", body: "1957. Russell Kirsch produced the first digital image on a computer—a small, graining scan of his son. It was the humble ancestor of every digital photograph, movie, and social media post in existence today." },
            "11-5": { head: "The Death of Mozart", body: "1791. Wolfgang Amadeus Mozart, perhaps the greatest musical prodigy in history, passed away in Vienna at just 35 years old. He left behind a body of work that remains the pinnacle of classical music achievement." },
            "11-6": { head: "The Ratification of the 13th Amendment", body: "1865. The 13th Amendment was formally ratified, constitutionally ending the dark era of slavery in the United States. It was the fulfillment of the promise of the Emancipation Proclamation." },
            "11-7": { head: "The Attack on Pearl Harbor", body: "1941. A 'date which will live in infamy.' The Japanese Navy launched a surprise attack on the US Pacific Fleet in Hawaii, drawing the United States directly into the global catastrophe of World War II." },
            "11-8": { head: "The Loss of a Legend", body: "1980. John Lennon, the voice of a generation and a champion of peace, was assassinated in New York. The world fell into a state of collective mourning for the artist who taught us to 'Imagine'." },
            "11-9": { head: "The First Computer Mouse", body: "1968. Douglas Engelbart gave 'The Mother of All Demos,' debuting the first computer mouse, hypertext, and video conferencing. It was the moment the future of personal computing was born." },
            "11-10": { head: "The Human Rights Declaration", body: "1948. The United Nations adopted the Universal Declaration of Human Rights. For the first time in history, the fundamental rights of every human being were protected by global consensus." },
            "11-11": { head: "The Last Man on the Moon", body: "1972. The Apollo 17 lunar module 'Challenger' landed on the Moon. When Gene Cernan stepped off the surface later that week, he was the last human to walk on another world—a record that still stands today." },
            "11-12": { head: "The First Transatlantic Radio", body: "1901. Guglielmo Marconi received the first transatlantic radio signal—the letter 'S' in Morse code. It was the moment the Atlantic Ocean was finally bridged by invisible, lightning-fast waves." },
            "11-13": { head: "The Golden Hind Sets Sail", body: "1577. Francis Drake departed England on a secret mission to raid Spanish settlements. His journey would eventually become the first English circumnavigation of the entire globe." },
            "11-14": { head: "The Conquest of the South Pole", body: "1911. Roald Amundsen and his Norwegian team became the first humans to reach the geographic South Pole, winning a perilous race against the British and mapping the Earth's final frontier." },
            "11-15": { head: "The Bill of Rights Ratified", body: "1791. The first ten amendments to the US Constitution became law. They guaranteed the fundamental freedoms—speech, press, and religion—that form the bedrock of the American identity." },
            "11-16": { head: "The Boston Tea Party", body: "1773. In a bold protest against British taxation, American colonists dumped 342 chests of tea into Boston Harbor. It was the defiant act that made the American Revolution inevitable." },
            "11-17": { head: "The Wright Brothers Fly", body: "1903. On the dunes of Kitty Hawk, Orville and Wilbur Wright achieved the first powered, controlled flight of a heavier-than-air aircraft. Humanity had finally taken wing." },
            "11-18": { head: "The First Voice from Space", body: "1958. The US launched Project SCORE, the world's first communications satellite. It broadcast a recorded Christmas message from President Eisenhower, the first time a human voice was heard from orbit." },
            "11-19": { head: "The End of the Apollo Era", body: "1972. Apollo 17 splashed down in the Pacific, successfully concluding the Apollo program. It marked the end of an era of unprecedented exploration and the furthest humans have ever traveled from home." },
            "11-20": { head: "The Louisiana Purchase", body: "1803. The United States formally took possession of the Louisiana Territory from France. At just 3 cents an acre, the purchase doubled the size of the nation and secured its future as a continental power." },
            "11-21": { head: "The Winter Solstice Alignment", body: "Throughout human history, this shortest day of the year has been marked by ancient monuments like Newgrange and Stonehenge—an eternal reminder of humanity's alignment with the cosmos." },
            "11-22": { head: "The First Human X-Ray", body: "1895. Wilhelm Röntgen captured the first X-ray image—the bones of his wife’s hand. It was a revolutionary moment for medicine, allowing us to see inside the living body for the first time." },
            "11-23": { head: "The Transistor Revolution", body: "1947. Bell Labs scientists successfully demonstrated the first point-contact transistor. It is arguably the most important invention of the 20th century, making all modern electronics possible." },
            "11-24": { head: "The Earthrise Revelation", body: "1968. As Apollo 8 orbited the Moon, astronaut William Anders captured the 'Earthrise' photograph. Seeing our world as a tiny, fragile blue marble in the void changed the global environmental consciousness forever." },
            "11-25": { head: "The Christmas Truce", body: "1914. Along the Western Front of WWI, the guns fell silent as soldiers from both sides emerged from their trenches to share carols, gifts, and football—a rare, beautiful moment of humanity in the midst of madness." },
            "11-26": { head: "The Great Tsunami", body: "2004. A massive undersea earthquake in the Indian Ocean triggered a cataclysmic tsunami. It remains one of the deadliest natural disasters in history, prompting a global overhaul of disaster warning systems." },
            "11-27": { head: "The Voyage of the Beagle Begins", body: "1831. Charles Darwin set sail on the HMS Beagle. The five-year journey provided the observations that would eventually lead to his groundbreaking theory of evolution by natural selection." },
            "11-28": { head: "The Birth of Cinema", body: "1895. In a basement café in Paris, the Lumière brothers held the first public screening of projected motion pictures. In that flickering light, the modern age of visual storytelling was born." },
            "11-29": { head: "Texas Becomes the 28th State", body: "1845. The United States formally annexed the Republic of Texas. The move expanded the American frontier but also intensified the tensions that would eventually lead to war with Mexico." },
            "11-30": { head: "The Formation of the USSR", body: "1922. Following years of revolution and civil war, the Union of Soviet Socialist Republics was formally established, creating a superpower that would define the geopolitics of the next 70 years." },
            "11-31": { head: "The Panama Canal Transfer", body: "1999. In a historic ceremony, the United States formally handed over control of the Panama Canal to Panama, ending nearly a century of American administration of the vital global waterway." },

            "default": { head: "A Pivot in Human History", body: "On this day, an untold sequence of events altered the cultural landscape of the era, marking your birthdate as a moment of significant global change." }
        };

        // 3. LOGIC TO SHOW RESULTS
        function revealArchive() {
            const mNames = ["January", "February", "March", "April", "May", "June", "July", "August", "September", "October", "November", "December"];
            const m = document.getElementById('month').value;
            const d = document.getElementById('day').value;
            const key = `${m}-${d}`;
            
            const event = historyArchive[key] || historyArchive["default"];
            
            document.getElementById('res-date').innerText = `${mNames[m]} ${d}`;
            document.getElementById('res-title').innerText = event.head;
            document.getElementById('res-desc').innerText = event.body;
            
            document.getElementById('artifact-card').style.display = 'block';
            document.getElementById('action-btns').style.display = 'flex';
            window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
        }

        // 4. DOWNLOAD AS IMAGE
        function downloadPNG() {
            const card = document.getElementById('artifact-card');
            html2canvas(card, { scale: 2, backgroundColor: null }).then(canvas => {
                const link = document.createElement('a');
                link.download = `yr365art-artifact.png`;
                link.href = canvas.toDataURL();
                link.click();
            });
        }

        // 5. SHARE TO X
        function shareX() {
            const title = document.getElementById('res-title').innerText;
            const text = encodeURIComponent(`History aligns on my birthday: "${title}"! Found on @yr365art.`);
            window.open(`https://twitter.com/intent/tweet?text=${text}`, '_blank');
        }

        // 6. RANDOM DATE
        function randomDate() {
            const randomMonth = Math.floor(Math.random() * 12);
            const randomDay = Math.floor(Math.random() * 31) + 1;
            document.getElementById('month').value = randomMonth;
            document.getElementById('day').value = randomDay;
            revealArchive();
        }
    </script>
</body>
